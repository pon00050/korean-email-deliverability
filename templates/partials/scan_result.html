<div style="
  background: var(--void-surface, #141b2d);
  border: 1px solid rgba(79, 143, 255, 0.12);
  border-radius: 16px;
  padding: 28px;
  color: #e2e8f0;
  animation: resultIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
">
  <style>
    @keyframes resultIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes scoreCount {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .sr-row { animation: resultIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .sr-row:nth-child(1) { animation-delay: 0.08s; }
    .sr-row:nth-child(2) { animation-delay: 0.12s; }
    .sr-row:nth-child(3) { animation-delay: 0.16s; }
    .sr-row:nth-child(4) { animation-delay: 0.20s; }
    .sr-row:nth-child(5) { animation-delay: 0.24s; }
    .sr-row:nth-child(6) { animation-delay: 0.28s; }
    .sr-row:nth-child(7) { animation-delay: 0.32s; }
  </style>

  <!-- Score header -->
  <div style="display:flex; align-items:center; gap:20px; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.06);">
    <div style="
      width:68px; height:68px; border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Sora',sans-serif; font-size:1.6rem; font-weight:800;
      {% if scores.overall >= 90 %}background:rgba(52,211,153,0.15); color:#34d399; border:1px solid rgba(52,211,153,0.2);
      {% elif scores.overall >= 75 %}background:rgba(79,143,255,0.15); color:#4f8fff; border:1px solid rgba(79,143,255,0.2);
      {% elif scores.overall >= 60 %}background:rgba(251,191,36,0.15); color:#fbbf24; border:1px solid rgba(251,191,36,0.2);
      {% elif scores.overall >= 40 %}background:rgba(251,146,60,0.15); color:#fb923c; border:1px solid rgba(251,146,60,0.2);
      {% else %}background:rgba(248,113,113,0.15); color:#f87171; border:1px solid rgba(248,113,113,0.2);{% endif %}
      flex-shrink:0;
      animation: scoreCount 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    ">{{ scores.grade }}</div>
    <div style="flex:1;">
      <div style="font-family:'Sora',sans-serif; font-size:2.2rem; font-weight:800; letter-spacing:-0.03em; line-height:1; animation: scoreCount 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;">
        {{ scores.overall }}<span style="font-size:0.8rem; font-weight:400; opacity:0.4; margin-left:2px;">/100</span>
      </div>
      <div style="font-size:0.78rem; color:#8892a8; margin-top:4px;">전체 도메인 건강 점수</div>
    </div>
    <div style="text-align:right; animation: scoreCount 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;">
      <div style="font-size:0.65rem; font-family:'Sora',sans-serif; letter-spacing:0.08em; text-transform:uppercase; color:#8892a8; margin-bottom:4px;">네이버 호환</div>
      <div style="font-family:'Sora',sans-serif; font-size:1.4rem; font-weight:700; letter-spacing:-0.02em;
        {% if scores.naver >= 80 %}color:#34d399;
        {% elif scores.naver >= 50 %}color:#fbbf24;
        {% else %}color:#f87171;{% endif %}
      ">{{ scores.naver }}</div>
    </div>
  </div>

  <!-- Check summary -->
  <div style="display:grid; gap:4px; margin-bottom:24px;">
    {% for c in checks %}
    <div class="sr-row" style="
      display:flex; align-items:center; gap:12px;
      padding:10px 14px;
      background: rgba(255,255,255,0.025);
      border-radius:10px;
      font-size:0.85rem;
    ">
      <span style="width:18px; text-align:center; font-size:0.8rem; flex-shrink:0;">
        {% if c.status == 'pass' %}&#x2705;{% elif c.status == 'warn' %}&#x26A0;&#xFE0F;{% elif c.status == 'fail' %}&#x274C;{% else %}&#x2796;{% endif %}
      </span>
      <span style="flex:1; font-weight:500;">{{ c.name }}</span>
      <span style="
        font-family:'IBM Plex Mono',monospace;
        font-size:0.72rem; font-weight:600;
        padding:3px 10px; border-radius:6px;
        {% if c.status == 'pass' %}background:rgba(52,211,153,0.1); color:#34d399;
        {% elif c.status == 'warn' %}background:rgba(251,191,36,0.1); color:#fbbf24;
        {% elif c.status == 'fail' %}background:rgba(248,113,113,0.1); color:#f87171;
        {% else %}background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3);{% endif %}
      ">{{ c.score }}</span>
    </div>
    {% endfor %}
  </div>

  <!-- Full report link -->
  <a href="/report/{{ public_token }}" style="
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:14px;
    background: rgba(79, 143, 255, 0.1);
    border: 1px solid rgba(79, 143, 255, 0.2);
    border-radius:12px;
    color:#93bbff;
    font-size:0.9rem;
    font-weight:600;
    text-decoration:none;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: resultIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  " onmouseover="this.style.background='rgba(79,143,255,0.18)';this.style.borderColor='rgba(79,143,255,0.35)';this.style.boxShadow='0 0 20px rgba(79,143,255,0.1)'" onmouseout="this.style.background='rgba(79,143,255,0.1)';this.style.borderColor='rgba(79,143,255,0.2)';this.style.boxShadow='none'">
    전체 보고서 보기 &#x2192;
  </a>
</div>
