<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Senderfit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 16px; padding: 40px 36px; max-width: 400px; width: 100%;
          box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .card h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
  .card .sub { font-size: 0.88rem; color: #64748b; margin-bottom: 28px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 0.95rem; font-family: inherit; margin-bottom: 16px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #2563eb; }
  button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #2563eb;
           color: #fff; font-size: 0.95rem; font-weight: 600; font-family: inherit; cursor: pointer;
           transition: background 0.2s; margin-top: 4px; }
  button:hover { background: #1d4ed8; }
  .error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px;
           font-size: 0.85rem; margin-bottom: 16px; }
  .links { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #64748b; }
  .links a { color: #2563eb; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <h1>로그인</h1>
    <p class="sub">Senderfit 대시보드에 접속하세요</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" required>
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">로그인</button>
    </form>

    <div class="links">
      계정이 없으신가요? <a href="/register">회원가입</a>
    </div>
  </div>
</body>
</html>
